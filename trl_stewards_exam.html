<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSC Driver Rules & Standards — Exam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,700;0,800;1,600&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surface:#111116;--surface2:#17171d;--surface3:#1e1e26;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --gold:#C8A84B;--gold-dim:rgba(200,168,75,0.12);
  --white:#EAEAEE;--muted:rgba(234,234,238,0.42);
  --green:#4DC98A;--red:#E05555;--blue:#5299E0;
  --ff-d:'Barlow Condensed',sans-serif;--ff-b:'Barlow',sans-serif;--ff-m:'Share Tech Mono',monospace;
}
body{background:var(--bg);color:var(--white);font-family:var(--ff-b);min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(200,168,75,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,0.02) 1px,transparent 1px);background-size:56px 56px}

/* TOPBAR */
.topbar{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(–border);background:rgba(9,9,11,0.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:14px}
.back{font-family:var(–ff-m);font-size:10px;letter-spacing:0.12em;color:var(–muted);background:none;border:1px solid var(–border);border-radius:3px;padding:5px 11px;cursor:pointer;transition:all 0.15s;text-decoration:none}
.back:hover{color:var(–white);border-color:var(–border2)}
.exam-name{font-family:var(–ff-d);font-weight:700;font-size:15px;letter-spacing:0.08em;text-transform:uppercase}
.timer{font-family:var(–ff-m);font-size:22px;letter-spacing:0.08em;color:var(–gold);transition:color 0.3s}
.timer.warn{color:var(–red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}

.progress-bar{height:2px;background:var(–surface3);flex-shrink:0}
.progress-fill{height:100%;background:var(–gold);transition:width 0.4s ease;width:0}

/* SCREENS */
.screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1}
.screen.hidden{display:none}

/* LOADING */
.spin{width:52px;height:52px;border-radius:50%;border:2px solid var(–border2);border-top-color:var(–gold);animation:spin 0.8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-t{font-family:var(–ff-m);font-size:12px;letter-spacing:0.22em;color:var(–muted);text-transform:uppercase;margin-bottom:8px}
.load-s{font-size:11px;color:rgba(234,234,238,0.22);font-style:italic}

/* EXAM */
.exam-body{flex:1;display:flex;gap:28px;max-width:880px;width:100%;margin:0 auto;padding:36px 28px;position:relative;z-index:1}
.q-col{flex:1;min-width:0}
.q-num-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.q-num{font-family:var(–ff-m);font-size:10px;letter-spacing:0.14em;color:var(–gold);background:var(–gold-dim);padding:3px 9px;border-radius:2px;border:1px solid rgba(200,168,75,0.18)}
.q-sec{font-family:var(–ff-m);font-size:9px;letter-spacing:0.2em;color:var(–muted);text-transform:uppercase}
.q-text{font-size:16px;line-height:1.7;color:var(–white);margin-bottom:28px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:13px;padding:13px 16px;background:var(–surface2);border:1px solid var(–border);border-radius:4px;cursor:pointer;text-align:left;transition:all 0.14s;width:100%;font-family:var(–ff-b);font-size:13px;color:var(–white);line-height:1.55}
.opt:hover:not(:disabled){border-color:var(–border2);background:var(–surface3)}
.opt.sel{border-color:var(–gold);background:var(–gold-dim)}
.opt.right{border-color:var(–green);background:rgba(77,201,138,0.1)}
.opt.wrong{border-color:var(–red);background:rgba(224,85,85,0.1)}
.opt:disabled{cursor:default}
.opt-k{font-family:var(–ff-d);font-weight:700;font-size:14px;color:var(–gold);min-width:18px;flex-shrink:0}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:28px}
.btn{font-family:var(–ff-d);font-weight:700;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;padding:9px 18px;border-radius:3px;cursor:pointer;transition:all 0.14s;border:none}
.btn-prev{background:var(–surface3);color:var(–muted);border:1px solid var(–border)}
.btn-prev:hover{color:var(–white);border-color:var(–border2)}
.btn-next{background:var(–gold);color:#09090b}
.btn-next:hover{background:#D4B45A}
.btn-submit{background:var(–green);color:#09090b}
.btn-submit:hover{filter:brightness(1.1)}
.btn:disabled{opacity:0.35;cursor:not-allowed}

/* SIDEBAR */
.sidebar{width:188px;flex-shrink:0}
.sb-lbl{font-family:var(–ff-m);font-size:9px;letter-spacing:0.2em;color:var(–muted);text-transform:uppercase;margin-bottom:10px}
.q-map{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:20px}
.qd{width:28px;height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:var(–ff-m);font-size:9px;border:1px solid var(–border);background:var(–surface2);color:var(–muted);cursor:pointer;transition:all 0.1s}
.qd.cur{border-color:var(–gold);background:var(–gold-dim);color:var(–gold)}
.qd.ans{background:var(–surface3);border-color:var(–border2);color:var(–white)}
.sb-stats{display:flex;flex-direction:column;gap:7px}
.sr{display:flex;justify-content:space-between;font-size:11px;color:var(–muted)}
.sr span:last-child{font-family:var(–ff-m);color:var(–white)}

/* RESULTS */
.results-body{max-width:860px;width:100%;margin:0 auto;padding:44px 28px;position:relative;z-index:1}
.verdict-block{text-align:center;margin-bottom:40px;padding-bottom:40px;border-bottom:1px solid var(–border)}
.v-eye{font-family:var(–ff-m);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(–muted);margin-bottom:14px}
.v-title{font-family:var(–ff-d);font-size:clamp(52px,9vw,88px);font-weight:800;text-transform:uppercase;line-height:0.88;margin-bottom:14px}
.v-title.pass{color:var(–green)}.v-title.prov{color:var(–gold)}.v-title.fail{color:var(–red)}
.v-score{font-family:var(–ff-d);font-size:68px;font-weight:800;line-height:1;margin-bottom:10px}
.v-desc{font-size:13px;color:var(–muted);max-width:440px;margin:0 auto;line-height:1.75}

.r-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:32px}
.rs{background:var(–surface);border:1px solid var(–border);border-radius:4px;padding:18px;text-align:center}
.rsv{font-family:var(–ff-d);font-size:34px;font-weight:800;margin-bottom:3px}
.rsl{font-size:10px;color:var(–muted);letter-spacing:0.12em;text-transform:uppercase}

/* Provisional banner */
.prov-banner{background:rgba(200,168,75,0.08);border:1px solid var(–gold-dim);border-radius:4px;padding:18px;margin-bottom:24px}
.prov-t{font-family:var(–ff-d);font-weight:700;font-size:16px;color:var(–gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.prov-d{font-size:12px;color:var(–muted);line-height:1.65}

/* Distinction banner */
.dist-banner{background:linear-gradient(135deg,rgba(200,168,75,0.12),rgba(200,168,75,0.04));border:1px solid var(–gold);border-radius:5px;padding:20px;margin-bottom:24px}
.dist-t{font-family:var(–ff-d);font-weight:800;font-size:17px;color:var(–gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px}
.dist-d{font-size:12px;color:var(–muted);line-height:1.7}

/* Review */
.rev-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rev-title{font-family:var(–ff-d);font-weight:700;font-size:15px;letter-spacing:0.1em;text-transform:uppercase}
.toggle-btn{font-family:var(–ff-m);font-size:10px;letter-spacing:0.1em;color:var(–muted);background:none;border:1px solid var(–border);border-radius:3px;padding:5px 11px;cursor:pointer}
.toggle-btn:hover{border-color:var(–border2);color:var(–white)}
.review-list{display:none}
.review-list.open{display:block}
.ri{background:var(–surface);border:1px solid var(–border);border-radius:4px;padding:18px;margin-bottom:10px}
.ri.c{border-left:3px solid var(–green)}.ri.w{border-left:3px solid var(–red)}
.ri-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ri-n{font-family:var(–ff-m);font-size:9px;color:var(–muted);letter-spacing:0.14em}
.ri-tag{font-family:var(–ff-m);font-size:9px;letter-spacing:0.1em;padding:2px 7px;border-radius:2px;text-transform:uppercase}
.ri-tag.c{background:rgba(77,201,138,0.12);color:var(–green)}
.ri-tag.w{background:rgba(224,85,85,0.12);color:var(–red)}
.ri-tag.s{background:rgba(234,234,238,0.07);color:var(–muted)}
.ri-q{font-size:13px;margin-bottom:10px;line-height:1.6}
.ri-ans{font-size:11px;color:var(–muted);margin-bottom:8px;line-height:1.6}
.ri-ans span{color:var(–white)}
.ri-exp{font-size:11px;color:var(–muted);padding:9px 11px;background:var(–surface3);border-radius:3px;line-height:1.65}
.retake-btn{width:100%;padding:13px;margin-top:28px;background:var(–surface);border:1px solid var(–border);color:var(–white);border-radius:4px;font-family:var(–ff-d);font-weight:700;font-size:14px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.15s}
.retake-btn:hover{border-color:var(–gold);color:var(–gold)}
.error-box{background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.25);border-radius:4px;padding:20px;margin:20px;font-size:13px;color:var(–red);line-height:1.7}

@media(max-width:680px){
.exam-body{flex-direction:column;padding:24px 16px}
.sidebar{width:100%}
.r-stats{grid-template-columns:repeat(2,1fr)}
}
</style>

</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <div class="tb-left">
    <a href="index.html" class="back">← Portal</a>
    <span class="exam-name" id="examName">WSC Driver Rules &amp; Standards</span>
  </div>
  <div class="timer" id="timer">30:00</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- LOADING -->

<div class="screen" id="screenLoad">
  <div class="spin"></div>
  <div class="load-t">Generating Examination</div>
  <div class="load-s">Compiling WSC Rulebook — fresh questions every attempt</div>
</div>

<!-- ERROR -->

<div class="screen hidden" id="screenError">
  <div class="error-box" id="errorMsg"></div>
</div>

<!-- EXAM -->

<div class="screen hidden" id="screenExam" style="flex-direction:row;align-items:flex-start;justify-content:flex-start">
  <div class="exam-body">
    <div class="q-col">
      <div class="q-num-row">
        <span class="q-num" id="qNum">Q01 / 50</span>
        <span class="q-sec" id="qSec"></span>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="opts" id="opts"></div>
      <div class="nav-row">
        <button class="btn btn-prev" id="btnPrev" onclick="nav(-1)">← Prev</button>
        <button class="btn btn-next" id="btnNext" onclick="nav(1)">Next →</button>
      </div>
    </div>
    <div class="sidebar">
      <div class="sb-lbl">Questions</div>
      <div class="q-map" id="qMap"></div>
      <div class="sb-stats">
        <div class="sr"><span>Answered</span><span id="sbAns">0/50</span></div>
        <div class="sr"><span>Remaining</span><span id="sbRem">50</span></div>
        <div class="sr"><span>Time Left</span><span id="sbTime" style="color:var(--gold)">30:00</span></div>
      </div>
    </div>
  </div>
</div>

<!-- RESULTS -->

<div class="screen hidden" id="screenResults">
  <div class="results-body" id="resultsBody"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const EXAM = {
  id: 'trl_steward',
  title: 'TRL Stewards Certification',
  league: 'TRL',
  total: 30,
  minutes: 45,
  passThreshold: 0.95,
  provisionalThreshold: null,
  hasProvisional: false,
  tierSystem: false,
  rulebook: `TRL Stewards Charter v3.0, TRL Universal Sporting Standard (USS) v3.5, TRL Universal Sporting Code (USC) v3.7, TRL PP Calculator, TRL Articles of Expulsion v3.0, Unified Probation Framework, TRL Charter v9.0. FIA International Sporting Code and Appendix L.

PASS REQUIREMENT: 95% — 29 of 30 correct. 94% is an Institutional Failure. Merit cannot be rounded up. No exceptions.

TRL AXLE RULE (USS v3.5):
- Inside moves: Attacker's front axle must be at or beyond the defender's rear axle at the braking zone entry marker.
- Outside moves: Attacker's front axle must reach defender's rear axle position at the corner apex.
- Overlap established = attacker has legal right to racing room through corner exit.
- Contact before overlap established = attacker bears full responsibility.
- Contact after overlap established + room denied = defender bears full responsibility.
- Contact after overlap established + room given = assess car control and shared responsibility.

TRL PP CALCULATOR:
- Tier 1: 1-3 PP (minor contact, no lasting effect on race).
- Tier 2: 4-6 PP (moderate — position lost, recoverable).
- Tier 3: 7-10 PP (serious — significant race damage or DNF threat).
- Tier 4: 11-15 PP (severe — DNF caused, suspension trigger).
- Tier 5: 16+ PP (catastrophic — automatic BSAC referral mandatory).
- Modifiers STACK on base tier: no position loss (+1PP), multi-car (+2PP), race-ending (+3PP).
- Zone modifiers: pit zone (+1PP), safety car period (+1PP).
- Intent modifier: deliberate (+2PP additional to all else).
- Steward must cite specific PP tier AND all applicable modifiers in written ruling.

CALCULATED DIVEBOMB (TRL Standard — USC v3.7):
- Legal: 0.3–0.5 second gap at reference point, axle rule met by turn-in, clean exit, full car control.
- Illegal: gap below 0.3s, contact before axle established, loss of control during maneuver.
- Stewards must verify gap evidence from timing/telemetry before classifying move.
- Gap below 0.3s = illegal divebomb. Minimum Tier 3 penalty. No mitigating factors permitted.
- Attacker 100% responsible for legal divebomb. Contact on legal divebomb = Tier 2 minimum.

FORENSIC EVIDENCE STANDARDS:
- POV footage required from BOTH cars for any Tier 2+ incident.
- 40-second minimum footage window prior to incident is mandatory.
- Telemetry (throttle, brake, steering trace) is admissible and CAN be determinative.
- Gap data from timing system is admissible to prove/disprove divebomb classification.
- Single POV + telemetry = sufficient for Tier 1. Dual POV + telemetry required for Tier 2+.
- Missing or incomplete footage from accused driver = adverse inference drawn.

TRL STEWARDS CHARTER v3.0:
- Steward Panel: minimum 3 stewards for Tier 3+ incidents. 2 stewards acceptable for Tier 1-2.
- Unanimous verdict required for Tier 4+ penalties.
- Dissenting steward must file a written dissent note in PitBoss.
- Stewards may NOT rule on incidents involving their own team or drivers with declared interests.
- Conflict of interest must be declared pre-review. Undeclared conflict = automatic removal from panel.
- All Steward communications regarding a case are confidential until ruling is published.

ARTICLES OF EXPULSION v3.0 — STEWARD KNOWLEDGE:
- Standard of proof: Balance of probabilities (51%+) for Tier 1-3 offences.
- High standard (near-certainty) for Tier 4-5 and expulsion-level sanctions.
- Right of appeal: 48 hours from notification of penalty, via PitBoss only.
- BSAC referral: mandatory for any Tier 5 offence or repeat Tier 4.
- Targeting: intentional malicious on-track conduct. First finding = mandatory BSAC referral.

PROBATION FRAMEWORK (Steward-issued):
- Stewards may attach probation to any penalty at sentencing.
- Probation triggers: 2 Tier 3 offences in 4 races, any Tier 4 offence.
- During probation: any further offence escalates automatically by 1 tier. No discretion.
- Probation minimum: 4 race sessions. Duration set in writing at sentencing.
- Universal Probation Violation Rule: no exceptions, no mitigating factors.

FIA APPENDIX L PRINCIPLES (applied in TRL):
- Predominant Responsibility: stewards identify who bears the greater share of fault.
- Causing a Collision: base offence classification. Contact + attributable fault required.
- Bringing the Sport into Disrepute: applies inside AND outside race sessions.
- Competitor Responsibility: TP is accountable for all members of their organisation.

TRL INCIDENT REPORTING:
- Filing rights: Team Principal or Sporting Director only (via PitBoss). Drivers cannot file directly.
- Deadlines: Weekday/Saturday events = 12 hours. Sunday events = 24 hours post-session.
- Protest limit: maximum 3 tickets per team per race weekend.
- One incident per ticket. Multi-incident submissions are rejected.
- All filings include: lap number, session, drivers involved, specific rule breach, neutral factual description.

TRL CHARTER v9.0 — STEWARD CONTEXT:
- Stewards Panel authority: granted by Charter v9.0 Article II. Traffic Court of TRL.
- BSAC: appeals court. Steward decisions can be appealed to BSAC within 48 hours.
- Commissioner: final authority. BSAC rulings reviewed within 24 hours by Commissioner.
- PitBoss: all rulings published and enforced via PitBoss. Verbal rulings not valid.`
};

// ── STATE ────────────────────────────────────────────────────────────────────
let questions = [], current = 0, answers = {}, timerSecs = EXAM.minutes * 60, timerInt = null, submitted = false;

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => { document.getElementById('examName').textContent = EXAM.title; generate(); });

async function generate() {
  show('screenLoad');
  try {
    const qs = await fetchQuestions();
    questions = shuffle(qs);
    renderExam();
    startTimer();
    show('screenExam');
  } catch(e) {
    document.getElementById('errorMsg').innerHTML = `<strong>Exam Generation Failed</strong><br><br>${e.message}<br><br>This exam requires an active internet connection.<br><br><a href="index.html" style="color:var(--gold)">← Return to Portal</a>`;
    show('screenError');
  }
}

async function fetchQuestions() {
  const prompt = `You are generating the TRL Stewards Certification exam — the hardest exam in the portal. 30 questions. Pass threshold: 95% (29/30 correct). 94% is an Institutional Failure.

RULEBOOK:
${EXAM.rulebook}

INSTRUCTIONS:
- Generate exactly 30 questions.
- Distribution: ~20% rule recall, ~40% applied scenario/ruling application, ~40% edge cases, threshold knowledge, and judgment calls.
- Questions must be specific and challenging. No obvious answers. Force genuine knowledge.
- All 4 options must be plausible — wrong options must be reasonable distractors, not clearly absurd.
- Cover all major areas: Axle Rule, PP Calculator, Calculated Divebomb, Evidence Standards, Probation Framework, Articles of Expulsion, FIA Appendix L principles, Incident Reporting, Charter authority structure.
- Grounded strictly in the TRL rulebook above.

RESPOND WITH ONLY VALID JSON:
{"questions":[{"id":1,"question":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"correct":"A","explanation":"Specific rule citation from TRL rulebook."}]}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:6000,messages:[{role:'user',content:prompt}]})
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  const text = data.content.map(b => b.text||'').join('');
  const clean = text.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  if (!parsed.questions || !parsed.questions.length) throw new Error('No questions returned.');
  return parsed.questions;
}

function renderExam() {
  renderQ(); renderMap(); updateSidebar();
  const next = document.getElementById('btnNext');
  const prev = document.getElementById('btnPrev');
  prev.disabled = current === 0;
  if (current === questions.length - 1) {
    next.textContent = 'Submit Exam ✓'; next.className = 'btn btn-submit'; next.onclick = () => submit();
  } else {
    next.textContent = 'Next →'; next.className = 'btn btn-next'; next.onclick = () => nav(1);
  }
}

function renderQ() {
  const q = questions[current];
  document.getElementById('qNum').textContent = `Q${String(current+1).padStart(2,'0')} / ${questions.length}`;
  document.getElementById('qSec').textContent = q.section || '';
  document.getElementById('qText').textContent = q.question;
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  ['A','B','C','D'].forEach(k => {
    const b = document.createElement('button');
    b.className = 'opt' + (answers[current] === k ? ' sel' : '');
    b.disabled = submitted;
    b.innerHTML = `<span class="opt-k">${k}</span><span>${q.options[k]}</span>`;
    b.onclick = () => { answers[current] = k; renderQ(); renderMap(); updateSidebar(); };
    opts.appendChild(b);
  });
}

function renderMap() {
  const map = document.getElementById('qMap');
  map.innerHTML = '';
  questions.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'qd' + (i===current?' cur':answers[i]?' ans':'');
    d.textContent = i+1;
    d.onclick = () => { current=i; renderExam(); };
    map.appendChild(d);
  });
}

function updateSidebar() {
  const ans = Object.keys(answers).length;
  document.getElementById('sbAns').textContent = `${ans}/${questions.length}`;
  document.getElementById('sbRem').textContent = questions.length - ans;
  document.getElementById('progressFill').style.width = `${(ans/questions.length)*100}%`;
}

function nav(dir) {
  current = Math.max(0, Math.min(questions.length-1, current+dir));
  renderExam();
}

function startTimer() {
  timerSecs = EXAM.minutes * 60;
  timerInt = setInterval(() => {
    timerSecs--;
    const fmt = fmtTime(timerSecs);
    document.getElementById('timer').textContent = fmt;
    document.getElementById('sbTime').textContent = fmt;
    document.getElementById('timer').classList.toggle('warn', timerSecs < 120);
    document.getElementById('sbTime').style.color = timerSecs < 120 ? 'var(--red)' : 'var(--gold)';
    if (timerSecs <= 0) { clearInterval(timerInt); submit(); }
  }, 1000);
}

function fmtTime(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function submit() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInt);
  renderResults();
  show('screenResults');
}

function renderResults() {
  let correct = 0;
  const detail = questions.map((q,i) => {
    const ua = answers[i];
    const ok = ua === q.correct;
    if (ok) correct++;
    return {...q, userAnswer:ua, ok};
  });
  const pct = correct / questions.length;
  const pctPct = Math.round(pct * 100);
  const pass = pct >= EXAM.passThreshold;
  const scoreColor = pass ? 'var(--green)' : 'var(--red)';
  const verdict = pass ? 'CERTIFIED' : 'FAILED';
  const needed = Math.ceil(questions.length * EXAM.passThreshold);

  document.getElementById('resultsBody').innerHTML = `
    <div class="verdict-block">
      <div class="v-eye">TRL · Stewards Certification</div>
      <div class="v-title ${pass?'pass':'fail'}">${verdict}</div>
      <div class="v-score" style="color:${scoreColor}">${pctPct}%</div>
      <div class="v-desc">${pass
        ? `You answered ${correct} of ${questions.length} questions correctly. TRL Steward certification threshold of 95% met. Your seat is earned.`
        : `You answered ${correct} of ${questions.length} correctly. Required: ${needed} correct (95%). ${pctPct === 94 ? 'A score of 94% is an Institutional Failure. Merit cannot be rounded up.' : 'Full retake required. No partial credit.'}`
      }</div>
    </div>
    <div class="r-stats">
      <div class="rs"><div class="rsv" style="color:var(--green)">${correct}</div><div class="rsl">Correct</div></div>
      <div class="rs"><div class="rsv" style="color:var(--red)">${questions.length-correct}</div><div class="rsl">Incorrect</div></div>
      <div class="rs"><div class="rsv" style="color:var(--gold)">${pctPct}%</div><div class="rsl">Score</div></div>
      <div class="rs"><div class="rsv" style="color:${scoreColor}">${pass?'✓':'✗'}</div><div class="rsl">Status</div></div>
    </div>
    <div class="rev-head">
      <div class="rev-title">Question Review</div>
      <button class="toggle-btn" onclick="toggleReview(this)">Show Review</button>
    </div>
    <div class="review-list" id="reviewList">
      ${detail.map((q,i) => `
        <div class="ri ${q.ok?'c':'w'}">
          <div class="ri-head">
            <span class="ri-n">Q${String(i+1).padStart(2,'0')}</span>
            <span class="ri-tag ${q.ok?'c':q.userAnswer?'w':'s'}">${q.ok?'Correct':q.userAnswer?'Incorrect':'Skipped'}</span>
          </div>
          <div class="ri-q">${q.question}</div>
          <div class="ri-ans">Your answer: <span>${q.userAnswer ? q.userAnswer+'. '+q.options[q.userAnswer] : 'Not answered'}</span>${!q.ok?`<br>Correct: <span style="color:var(--green)">${q.correct}. ${q.options[q.correct]}</span>`:''}</div>
          <div class="ri-exp">${q.explanation}</div>
        </div>`).join('')}
    </div>
    <button class="retake-btn" onclick="retake()">↺ Generate New Exam &amp; Retake</button>
  `;
}

function toggleReview(btn) {
  const list = document.getElementById('reviewList');
  const open = list.classList.toggle('open');
  btn.textContent = open ? 'Hide Review' : 'Show Review';
}

async function retake() {
  questions=[]; current=0; answers={}; submitted=false; timerSecs=EXAM.minutes*60;
  document.getElementById('progressFill').style.width='0';
  document.getElementById('timer').textContent=fmtTime(EXAM.minutes*60);
  document.getElementById('timer').classList.remove('warn');
  await generate();
}

function show(id) {
  ['screenLoad','screenError','screenExam','screenResults'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
</script>
